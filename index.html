    width: 10%;

    align-items: center;

/* MAIN */

    margin-top: 40px;

    font-weight: bold;
    cursor: pointer;
    color: white;
    background: linear-gradient(135deg, rgba(59,130,246,0.4), rgba(59,130,246,0.1));
    backdrop-filter: blur(10px);
    box-shadow: 0 0 10px rgba(59,130,246,0.5);
}

/* SELECT */
select {
    padding: 10px;
    border-radius: 12px;
    border: none;
    background: rgba(255,0,0,0.4);

}

/* OUTPUT */
#output {
    margin-top: 20px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.08);
    min-height: 80px;
    font-size: 20px;
    font-weight: bold;
    text-transform: uppercase;
}

/* SHAKE */
@keyframes shake {
    25% { transform: translate(2px,-2px); }
    50% { transform: translate(-2px,2px); }
    75% { transform: translate(2px,2px); }
}
.shake {
    animation: shake 0.2s;
}

#judge {
    margin-top: 10px;
    color: #ff4d4d;
}

#users {
    margin-top: 10px;
    color: #3b82f6;
}

<script>

/* VISITOR DETECTION */
if(localStorage.getItem("visited")){
    returnMsg.innerText="YOU'VE BEEN HERE BEFORE...";
}else{
    localStorage.setItem("visited",true);
    returnMsg.innerText="FIRST TIME? WELCOME 😈";
}

/* FAKE USERS */
let users=Math.floor(Math.random()*2000)+1000;
setInterval(()=>{
    users+=Math.floor(Math.random()*20-10);
    if(users<1000) users=1200;
    usersEl.innerText=users+" PEOPLE PLAYING NOW";
},2000);

const usersEl=document.getElementById("users");

/* SHUFFLE */
function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
}

/* CREATE 100 UNIQUE */
function makeList(prefix){
    let base=[
        prefix+" 1",prefix+" 2",prefix+" 3",prefix+" 4",prefix+" 5",
        prefix+" 6",prefix+" 7",prefix+" 8",prefix+" 9",prefix+" 10"
    ];
    while(base.length<100){
        base.push(prefix+" "+(base.length+1));
    }
    return shuffle(base);
}

/* DATA */
let data={
    truth:{
        safe:makeList("TELL A HARMLESS TRUTH"),
        spicy:makeList("REVEAL SOMETHING SPICY"),
        extreme:makeList("EXPOSE YOUR DARKEST TRUTH")
    },
    dare:{
        safe:makeList("DO SOMETHING EASY"),
        spicy:makeList("DO SOMETHING BOLD"),
        extreme:makeList("DO SOMETHING RISKY")
    }
};

/* GET UNIQUE */
function getItem(type,level){
    if(data[type][level].length===0){
        data[type][level]=makeList(
            level==="safe"?(type==="truth"?"TELL A HARMLESS TRUTH":"DO SOMETHING EASY"):
            level==="spicy"?(type==="truth"?"REVEAL SOMETHING SPICY":"DO SOMETHING BOLD"):
            (type==="truth"?"EXPOSE YOUR DARKEST TRUTH":"DO SOMETHING RISKY")
        );
    }
    return data[type][level].pop();
}

/* UI */
const output=document.getElementById("output");
const judge=document.getElementById("judge");
const levelEl=document.getElementById("level");

const judgeLines=[
"YOU'RE PREDICTABLE 😏",
"I’M WATCHING YOU 👁️",
"YOU KEEP COMING BACK..."
];

function start(type){
    output.innerText="AI THINKING...";
    setTimeout(()=>generate(type),700);
}

function generate(type){
    let level=levelEl.value;
    let item=getItem(type,level);

    output.classList.remove("shake");
    output.style.color="white";

    output.innerText=item;

    if(level==="extreme"){
        output.classList.add("shake");
        output.style.color="#ff0000";
    }

    setTimeout(()=>{
        judge.innerText=judgeLines[Math.floor(Math.random()*judgeLines.length)];
    },700);
}

</script>
