<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fake Chat Generator</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: white;
}

/* Layout */
.container {
  display: grid;
  grid-template-columns: 20% 60% 20%;
  height: 100vh;
}

/* Ads */
.ad {
  display: flex;
  justify-content: center;
  align-items: center;
  color: #aaa;
  border-left: 1px solid rgba(255,255,255,0.1);
  border-right: 1px solid rgba(255,255,255,0.1);
}

/* Main content */
.main {
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Glass card */
.glass {
  width: 100%;
  max-width: 400px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

/* Chat area */
.chat-box {
  height: 400px;
  overflow-y: auto;
  padding: 10px;
  border-radius: 15px;
  background: rgba(0,0,0,0.2);
}

/* Messages */
.msg {
  padding: 8px 12px;
  margin: 5px 0;
  border-radius: 12px;
  max-width: 70%;
  word-wrap: break-word;
}

.left {
  background: #334155;
  align-self: flex-start;
}

.right {
  background: #2563eb;
  align-self: flex-end;
}

/* Input */
.controls {
  margin-top: 10px;
  display: flex;
  gap: 5px;
}

input {
  flex: 1;
  padding: 8px;
  border-radius: 10px;
  border: none;
  outline: none;
}

/* Buttons */
button {
  padding: 8px 10px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

.download {
  margin-top: 10px;
  width: 100%;
  background: #22c55e;
}
</style>
</head>

<body>

<div class="container">

  <!-- Left Ad -->
  <div class="ad">
    <p>Ad Space</p>
  </div>

  <!-- Main Tool -->
  <div class="main">
    <h2>Fake Chat Generator</h2>

    <div class="glass" id="chatArea">
      <div class="chat-box" id="chatBox"></div>
    </div>

    <div class="controls">
      <input type="text" id="msgInput" placeholder="Type message...">
      <button onclick="addMsg('left')">Left</button>
      <button onclick="addMsg('right')">Right</button>
    </div>

    <button class="download" onclick="downloadChat()">Download Chat</button>
  </div>

  <!-- Right Ad -->
  <div class="ad">
    <p>Ad Space</p>
  </div>

</div>

<script>
function addMsg(side) {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if (!text) return;

  const msg = document.createElement("div");
  msg.classList.add("msg", side);
  msg.innerText = text;

  document.getElementById("chatBox").appendChild(msg);
  input.value = "";

  document.getElementById("chatBox").scrollTop =
    document.getElementById("chatBox").scrollHeight;
}

function downloadChat() {
  html2canvas(document.getElementById("chatArea")).then(canvas => {
    const link = document.createElement("a");
    link.download = "fake_chat.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
