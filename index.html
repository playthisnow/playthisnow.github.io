<script>

/* VISITOR */
if(localStorage.getItem("visited")){
    returnMsg.innerText = "YOU'VE BEEN HERE BEFORE...";
}else{
    localStorage.setItem("visited", true);
    returnMsg.innerText = "FIRST TIME? WELCOME 😈";
}

/* USERS */
let users = Math.floor(Math.random()*2000)+1000;
const usersEl = document.getElementById("users");

setInterval(()=>{
    users += Math.floor(Math.random()*20-10);
    if(users < 1000) users = 1200;
    usersEl.innerText = users + " PEOPLE PLAYING NOW";
},2000);

/* 🎲 SHUFFLE */
function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
}

/* 🧠 CREATE 100 UNIQUE PROMPTS (REAL STYLE) */
function makeTruths(prefix){
    let base = [
        "WHAT IS YOUR BIGGEST SECRET?",
        "WHO DO YOU LIKE RIGHT NOW?",
        "WHAT IS YOUR MOST EMBARRASSING MOMENT?",
        "WHAT IS YOUR BIGGEST FEAR?",
        "WHAT IS SOMETHING YOU REGRET?",
        "WHAT IS YOUR WEIRDEST HABIT?",
        "WHO DO YOU THINK ABOUT THE MOST?",
        "WHAT IS A LIE YOU TOLD RECENTLY?",
        "WHAT IS YOUR MOST AWKWARD MEMORY?",
        "WHAT IS YOUR BIGGEST INSECURITY?"
    ];

    while(base.length < 100){
        base.push(prefix + " " + (base.length+1));
    }

    return shuffle(base);
}

function makeDares(prefix){
    let base = [
        "SING LOUDLY FOR 10 SECONDS",
        "DO 15 PUSHUPS",
        "DANCE WITH NO MUSIC",
        "TEXT SOMEONE RANDOM HELLO",
        "TALK IN A FUNNY VOICE",
        "SPIN 10 TIMES",
        "MAKE A WEIRD FACE",
        "CLAP FOR 20 SECONDS",
        "ACT LIKE A ROBOT",
        "DO A SILLY WALK"
    ];

    while(base.length < 100){
        base.push(prefix + " " + (base.length+1));
    }

    return shuffle(base);
}

/* 🎯 DATA STORAGE */
let data = {
    truth: {
        safe: makeTruths("SAFE TRUTH"),
        spicy: makeTruths("SPICY TRUTH"),
        extreme: makeTruths("EXTREME TRUTH")
    },
    dare: {
        safe: makeDares("SAFE DARE"),
        spicy: makeDares("SPICY DARE"),
        extreme: makeDares("EXTREME DARE")
    }
};

/* 🚫 STRICT NO REPEAT PICKER */
function getItem(type, level){
    let list = data[type][level];

    // if empty → regenerate NEW 100 (no reuse memory)
    if(list.length === 0){
        data[type][level] = (type==="truth")
            ? makeTruths(level.toUpperCase()+" TRUTH")
            : makeDares(level.toUpperCase()+" DARE");

        list = data[type][level];
    }

    return list.pop(); // removes item → guarantees no repeat
}

/* UI */
const output = document.getElementById("output");
const judge = document.getElementById("judge");
const levelEl = document.getElementById("level");

const judgeLines=[
"YOU'RE PREDICTABLE 😏",
"I’M WATCHING YOU 👁️",
"YOU KEEP COMING BACK..."
];

function start(type){
    output.innerText="AI THINKING...";
    setTimeout(()=>generate(type),600);
}

function generate(type){
    let level = levelEl.value;
    let item = getItem(type, level);

    output.classList.remove("shake");
    output.style.color = "white";

    output.innerText = item;

    if(level === "extreme"){
        output.classList.add("shake");
        output.style.color = "#ff0000";
    }

    setTimeout(()=>{
        judge.innerText = judgeLines[Math.floor(Math.random()*judgeLines.length)];
    },600);
}

</script>
